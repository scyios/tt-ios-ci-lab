name: DemoApp CI Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-archive:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -print-path

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods

      - name: Pod install (DemoApp)
        working-directory: ./DemoApp
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          pod install

      - name: Build Debug (xcodebuild clean build)
        working-directory: .
        run: |
          chmod +x ci-scripts/build/build_debug.sh
          ./ci-scripts/build/build_debug.sh

      - name: Archive & Export IPA
        working-directory: .
        run: |
          chmod +x ci-scripts/build/build_archive.sh
          ./ci-scripts/build/build_archive.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoApp-ipa
          path: DemoApp/build/ipa

